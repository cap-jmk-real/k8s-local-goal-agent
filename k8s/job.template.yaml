# One-shot Job variant (same loop, single replica, no always-on).
apiVersion: batch/v1
kind: Job
metadata:
  name: __WORKER_NAME__-job
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: __WORKER_NAME__
    app.kubernetes.io/component: local-goal-agent
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: __WORKER_NAME__
        app.kubernetes.io/component: local-goal-agent
    spec:
      restartPolicy: Never
      containers:
        - name: goal-worker
          image: node:22-bookworm
          command: ["/bin/bash", "/app/scripts/local-goal-loop.sh"]
          envFrom:
            - configMapRef:
                name: __WORKER_NAME__
          env:
            - name: GH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: goal-agent-secrets
                  key: GH_TOKEN
          volumeMounts:
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: __PVC_NAME__
